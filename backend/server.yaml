signKey: "sercrethatmaycontainch@r$32chars" # this is the token signing key. change this before start server
debugMode: true # debug mode
db:
  driver: "sqlite"
  dsn: "./data/server.db" # 工作目录为 /app，故解析为 /app/data/server.db；可改为绝对路径 "/app/data/server.db"
  timeZone: "Asia/Shanghai" # setting the time zone fixes the database creation time problem
  showSql: false

  # driver: "mysql"
  # dsn: "root:123@tcp(localhost:3306)/test?charset=utf8mb4"
httpConfig:
  printRequestLog: true
  staticdir: "/app/dist" # Docker 内路径；源码部署请改为 dist 实际路径（如 "../soybean-admin/dist"）
  port: ":8080" # api server port
  adminPath: "/admin" # 管理后台 API 路由前缀，修改后需同步修改前端 .env.prod 中 VITE_SERVICE_BASE_URL 并重新构建

smtpConfig:
  host: "127.0.0.1"
  port: 1025
  username: "test"
  password: "test"
  encryption: "none" # none ssl/tls starttls
  from: "test@localhost.com"

jobsConfig:
  deviceCheckJob:
    duration: 30
